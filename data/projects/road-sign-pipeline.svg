<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Road sign detection pipeline</title>
  <desc id="desc">Camera frame, YOLO detector, crop classifier, ONNX inference, and recognized sign output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.58" stop-color="#0e1726"/>
      <stop offset="1" stop-color="#062821"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#142033"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <style>
      text{font-family:Arial,sans-serif}
      .title{font-size:34px;font-weight:800;fill:#f8fafc}
      .sub{font-size:19px;font-weight:600;fill:#a8b3c4}
      .step{font-size:20px;font-weight:800;fill:#f8fafc}
      .note{font-size:15px;font-weight:600;fill:#94a3b8}
      .tech{font-size:15px;font-weight:800;fill:#67e8f9}
      .card{fill:url(#panel);stroke:#1d9aaa;stroke-width:2}
      .arrow{stroke:#22d3ee;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}
    </style>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <path d="M0 640C190 565 310 710 505 635s310-195 695-90v215H0z" fill="#22d3ee" opacity=".045"/>
  <path d="M100 165h1000" stroke="#ffffff" stroke-opacity=".08"/>
  <text x="82" y="86" class="title">Road Sign Detection</text>
  <text x="82" y="122" class="sub">Two-stage computer vision pipeline for Raspberry Pi deployment</text>

  <rect x="78" y="220" width="205" height="282" rx="22" class="card"/>
  <rect x="112" y="260" width="137" height="92" rx="12" fill="#0f766e" opacity=".42"/>
  <path d="M132 332h98l-20-56h-58z" fill="#38bdf8" opacity=".65"/>
  <rect x="145" y="278" width="72" height="56" rx="8" fill="none" stroke="#f43f5e" stroke-width="5"/>
  <text x="112" y="410" class="step">Camera frame</text>
  <text x="112" y="438" class="note">input image</text>

  <path d="M310 362h78" class="arrow"/>
  <path d="M370 342l28 20-28 20" class="arrow"/>

  <rect x="420" y="220" width="205" height="282" rx="22" class="card"/>
  <rect x="476" y="264" width="94" height="72" rx="12" fill="none" stroke="#67e8f9" stroke-width="6"/>
  <circle cx="523" cy="300" r="58" fill="#22d3ee" opacity=".09" stroke="#22d3ee" stroke-width="3"/>
  <path d="M474 300h98M523 251v98" stroke="#67e8f9" stroke-width="4" opacity=".55"/>
  <text x="458" y="410" class="step">Detect sign</text>
  <text x="458" y="438" class="note">YOLO export with NCNN</text>

  <path d="M650 362h78" class="arrow"/>
  <path d="M710 342l28 20-28 20" class="arrow"/>

  <rect x="760" y="220" width="205" height="282" rx="22" class="card"/>
  <rect x="810" y="258" width="104" height="104" rx="16" fill="#f59e0b" opacity=".16" stroke="#fbbf24" stroke-width="4"/>
  <path d="M862 277l54 91H808z" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linejoin="round"/>
  <text x="800" y="410" class="step">Classify crop</text>
  <text x="800" y="438" class="note">ONNX Runtime classifier</text>

  <rect x="410" y="560" width="400" height="122" rx="20" fill="#07111f" stroke="#22c55e" stroke-width="2"/>
  <text x="440" y="613" class="step">Output</text>
  <text x="440" y="641" class="note">recognized class or other_sign reject</text>
  <text x="440" y="666" class="tech">OpenCV | ONNX Runtime | NCNN</text>

  <path d="M870 503c0 58-45 98-70 112" class="arrow" opacity=".8"/>
</svg>
